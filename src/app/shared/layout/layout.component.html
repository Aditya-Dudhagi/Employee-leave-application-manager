<div class="layout-wrapper">
  <mat-toolbar class="toolbar" color="primary">
    <button mat-icon-button (click)="toggleSidenav()" matTooltip="Toggle Menu">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="toolbar-brand">
      <mat-icon class="brand-icon-sm">event_available</mat-icon>
      <span class="brand-text">LeaveFlow</span>
    </div>

    <span class="toolbar-spacer"></span>

    <div class="toolbar-user">
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ roleLabel }}</span>
      </div>
      <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="Account">
        <div class="avatar">{{ userName.charAt(0) }}</div>
      </button>
      <mat-menu #userMenu="matMenu" xPosition="before">
        <div class="menu-header">
          <div class="menu-avatar">{{ userName.charAt(0) }}</div>
          <div>
            <div class="menu-name">{{ userName }}</div>
            <div class="menu-role">{{ roleLabel }}</div>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav
      #sidenav
      [mode]="'side'"
      [opened]="isSidenavOpen"
      class="sidenav">

      <div class="sidenav-content">
        <div class="nav-section">
          <span class="nav-label">NAVIGATION</span>

          <!-- Employee Nav -->
          <ng-container *ngIf="isEmployee">
            <a mat-list-item routerLink="/employee/dashboard" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">dashboard</mat-icon>
              <span class="nav-text">Dashboard</span>
            </a>
            <a mat-list-item routerLink="/employee/apply-leave" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">add_circle</mat-icon>
              <span class="nav-text">Apply Leave</span>
            </a>
            <a mat-list-item routerLink="/employee/my-leaves" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">list_alt</mat-icon>
              <span class="nav-text">My Leaves</span>
            </a>
          </ng-container>

          <!-- HR Nav -->
          <ng-container *ngIf="isHR">
            <a mat-list-item routerLink="/hr/dashboard" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">dashboard</mat-icon>
              <span class="nav-text">Dashboard</span>
            </a>
            <a mat-list-item routerLink="/hr/manage-leaves" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">assignment</mat-icon>
              <span class="nav-text">Manage Leaves</span>
            </a>
            <a mat-list-item routerLink="/hr/employees" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">groups</mat-icon>
              <span class="nav-text">Employees</span>
            </a>
            <a mat-list-item routerLink="/hr/add-employee" routerLinkActive="active-link" class="nav-item">
              <mat-icon class="nav-icon">person_add</mat-icon>
              <span class="nav-text">Add Employee</span>
            </a>
          </ng-container>
        </div>

        <div class="sidenav-footer">
          <mat-divider></mat-divider>
          <button mat-button class="logout-btn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sign Out</span>
          </button>
        </div>
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <div class="page-container">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
