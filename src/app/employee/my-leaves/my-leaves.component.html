<div class="my-leaves">
  <div class="page-header">
    <div>
      <h1 class="page-title">My Leave Requests</h1>
      <p class="page-subtitle">Track and manage all your leave applications</p>
    </div>
    <a mat-raised-button routerLink="/employee/apply-leave" class="apply-btn">
      <mat-icon>add</mat-icon>
      Apply Leave
    </a>
  </div>

  <mat-card class="table-card">
    <div class="filter-bar">
      <div class="filter-chips">
        <button mat-button
                *ngFor="let status of ['All', 'Pending', 'Approved', 'Rejected']"
                [class.active]="statusFilter === status"
                [class.filter-pending]="status === 'Pending'"
                [class.filter-approved]="status === 'Approved'"
                [class.filter-rejected]="status === 'Rejected'"
                (click)="onFilterChange(status)">
          {{ status }}
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table mat-table [dataSource]="filteredLeaves" class="leaves-table" *ngIf="filteredLeaves.length > 0">

        <ng-container matColumnDef="dates">
          <th mat-header-cell *matHeaderCellDef>Date Range</th>
          <td mat-cell *matCellDef="let leave">
            <div class="date-range">
              <mat-icon class="date-icon">date_range</mat-icon>
              {{ leave.fromDate }} — {{ leave.toDate }}
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="leaveType">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let leave">
            <span class="type-chip" [class.half]="leave.leaveType === 'Half Day'">
              {{ leave.leaveType }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="reason">
          <th mat-header-cell *matHeaderCellDef>Reason</th>
          <td mat-cell *matCellDef="let leave">{{ leave.reason }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let leave">
            <span class="status-badge"
                  [class.status-pending]="leave.status === 'Pending'"
                  [class.status-approved]="leave.status === 'Approved'"
                  [class.status-rejected]="leave.status === 'Rejected'">
              {{ leave.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let leave">
            <button mat-icon-button color="warn"
                    *ngIf="leave.status === 'Pending'"
                    (click)="cancelLeave(leave.id)"
                    matTooltip="Cancel Leave">
              <mat-icon>cancel</mat-icon>
            </button>
            <span class="no-action" *ngIf="leave.status !== 'Pending'">—</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <div class="empty-state" *ngIf="filteredLeaves.length === 0">
      <mat-icon>inbox</mat-icon>
      <p>No leave requests found</p>
    </div>
  </mat-card>
</div>
